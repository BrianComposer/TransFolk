<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TransFolk Generator</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.9.0/build/opensheetmusicdisplay.min.js"></script>
</head>

<body>

<header>
  <h1>TransFolk</h1>
  <p>Symbolic folk melody generation</p>
</header>

<main>

<section class="panel">

  <label>
    Input MusicXML / MXL
    <input type="file" id="file" accept=".xml,.musicxml,.mxl" />
  </label>

  <!-- ✅ NUEVO: selector real de modelos -->
  <label>
    Model
    <select id="modelId"></select>
  </label>

  <!-- ❌ ELIMINADO: algorithm / mode / timeSignature -->

  <!-- PARAMS -->
  <label class="param">
    <span>Temperature</span>
    <input type="range" id="temperature" min="0.0" max="2.5" step="0.1" value="1.2"/>
    <span id="temperatureValue">1.2</span>
  </label>

  <label class="param">
    <span>Penalty</span>
    <input type="range" id="penalty" min="0.0" max="2.5" step="0.1" value="0.5"/>
    <span id="penaltyValue">0.5</span>
  </label>

  <label class="param">
    <span>Top-K</span>
    <input type="range" id="topk" min="0" max="50" step="1" value="25"/>
    <span id="topkValue">25</span>
  </label>

  <label class="param">
    <span>Top-P</span>
    <input type="range" id="topp" min="0.0" max="1.0" step="0.05" value="0.9"/>
    <span id="toppValue">0.9</span>
  </label>

  <label>
    Max length
    <select id="maxLen">
      <option value="128">128</option>
      <option value="256" selected>256</option>
      <option value="512">512</option>
      <option value="1024">1024</option>
    </select>
  </label>

  <div class="actions">
    <button id="generateBtn">Generate</button>
  </div>

  <pre id="log"></pre>

</section>

<section class="score-wrap">
  <h2>Score</h2>
  <div id="score"></div>
  <div id="outputScore"></div>

  <button id="playBtn" disabled>▶ Play</button>
  <button id="pauseBtn" disabled>⏸ Pause</button>
  <button id="stopBtn" disabled>⏹ Stop</button>

  <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8">

  <label>Tempo: <span id="tempoValue">120</span></label>
  <input id="tempo" type="range" min="40" max="240" value="120">
</section>

<a id="downloadXml" class="hidden">Download XML</a>
<a id="downloadMidi" class="hidden">Download MIDI</a>

</main>

<script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
<script src="https://unpkg.com/@tonejs/midi"></script>

<script src="app.js"></script>

</body>
</html>
